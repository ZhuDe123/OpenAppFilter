<link rel="stylesheet" href="<%=resource%>/css/common.css">
<% local dsp=require "luci.dispatcher" -%>

<script type="text/javascript" src="<%=resource%>/echarts.min.js?v=5.0"></script>

<style type="text/css">
    #traffic-container { padding: 15px; }
    #traffic-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 15px; }
    #traffic-toolbar button { padding: 6px 16px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; }
    #traffic-toolbar button.active { background: #337ab7; color: #fff; border-color: #2e6da4; }
    #time-range-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 12px; }
    #time-range-bar button { padding: 4px 12px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; font-size: 12px; }
    #time-range-bar button.active { background: #337ab7; color: #fff; border-color: #2e6da4; }
    #traffic-chart { width: 100%; height: 350px; }
    #traffic-summary { display: flex; gap: 20px; margin: 15px 0; font-size: 14px; }
    #traffic-summary .stat-item { background: #f5f5f5; padding: 10px 20px; border-radius: 4px; }
    #traffic-search { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
    #traffic-filter select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
    .sort-arrow { cursor: pointer; user-select: none; }
    .sort-arrow.active { color: #337ab7; font-weight: bold; }
    .traffic-table td, .traffic-table th { padding: 8px 12px; text-align: left; white-space: nowrap; }
    .traffic-table td.ip-col { white-space: normal; word-break: break-all; max-width: 260px; }
    /* 隐藏原生细节标记，改用更现代的手型 */
    .traffic-table details summary {
        cursor: pointer;
        outline: none;
        list-style: none; /* Chrome/Firefox */
    }
    .traffic-table details summary::-webkit-details-marker {
        display: none; /* Safari */
    }
    /* 展开/收起的小提示后缀 */
    .ip-count-badge {
        font-size: 11px;
        color: #337ab7;
        margin-left: 5px;
        font-weight: normal;
    }
    /* 展开后的附加 IP 盒子 */
    .ip-list-box {
        margin-top: 4px;
        padding: 4px 8px;
        background: #f9f9f9;
        border-left: 2px solid #337ab7;
        border-radius: 0 4px 4px 0;
        font-size: 12px;
        color: #666;
        font-weight: normal;
        line-height: 1.5;
    }
</style>

<script type="text/javascript">//<![CDATA[
    var chartInstance = null;
    var pollTimer = null;
    var pollInterval = 60000;  // 60 秒刷新
    var currentPeriod = 'day';
    var currentDate = '';
    var currentTimeRange = 'all';
    var ipAllData = [];
    var currentPage = 1;
    var pageSize = 10;
    var searchTerm = '';
    var ipFilter = 'all';
    var sortField = 'total';
    var sortOrder = 'desc';

    // ==== 工具函数 ====

    function formatBytes(bytes) {
        if (!bytes || bytes < 0) return '0 B';
        bytes = Math.round(bytes);
        if (bytes < 1024) return bytes + ' B';
        else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        else if (bytes < 1073741824) return (bytes / (1048576)).toFixed(1) + ' MB';
        else if (bytes < 1099511627776) return (bytes / (1073741824)).toFixed(1) + ' GB';
        else return (bytes / 1099511627776).toFixed(1) + ' TB';
    }

    function getToday() {
        var now = new Date();
        return now.getFullYear() + '-' + 
               String(now.getMonth() + 1).padStart(2, '0') + '-' + 
               String(now.getDate()).padStart(2, '0');
    }

    function getThisMonth() { return getToday().substring(0, 7); }
    function getThisYear() { return getToday().substring(0, 4); }

    function getDefaultDate() {
        if (currentPeriod == 'day') return getToday();
        if (currentPeriod == 'month') return getThisMonth();
        return getThisYear();
    }

    // ==== 前端聚合：按数据量调整分钟粒度 ====
    function aggregateMinuteData(data) {
        if (!data || data.length <= 60) return data;
        var interval = data.length <= 300 ? 10 : data.length <= 720 ? 30 : 60;
        var result = [], bucket = null;
        for (var i = 0; i < data.length; i++) {
            var t = data[i].time.split(':');
            var h = parseInt(t[0]) || 0, m = parseInt(t[1]) || 0;
            var bm = Math.floor(m / interval) * interval;
            var bt = String(h).padStart(2, '0') + ':' + String(bm).padStart(2, '0');
            if (!bucket || bucket.time != bt) {
                if (bucket) result.push(bucket);
                bucket = { time: bt, upload: data[i].upload || 0, download: data[i].download || 0 };
            } else {
                bucket.upload += (data[i].upload || 0);
                bucket.download += (data[i].download || 0);
            }
        }
        if (bucket) result.push(bucket);
        return result;
    }

    // ==== 按 MAC 聚合 IP 数据（新 schema：每 MAC 一行 + ip_list 逗号分隔）====
    function aggregateByMAC(ipList) {
        var macMap = {};
        for (var i = 0; i < ipList.length; i++) {
            var d = ipList[i];
            var mac = d.mac || 'unknown';
            if (!macMap[mac]) {
                macMap[mac] = { ips: [], mac: mac, hostname: d.hostname || '', upload: 0, download: 0 };
            }
            // Parse ip_list (comma-separated) into ips array
            var ips = d.ip_list ? d.ip_list.split(',') : [];
            for (var k = 0; k < ips.length; k++) {
                if (ips[k] && macMap[mac].ips.indexOf(ips[k]) < 0) macMap[mac].ips.push(ips[k]);
            }
            macMap[mac].upload += (d.upload || 0);
            macMap[mac].download += (d.download || 0);
            if (d.hostname) macMap[mac].hostname = d.hostname;
        }
        var result = [];
        for (var key in macMap) {
            if (macMap.hasOwnProperty(key)) result.push(macMap[key]);
        }
        return result;
    }

    // ==== 获取过滤和排序后的 IP 列表 ====
    function getFilteredSortedIPs() {
        var data = aggregateByMAC(ipAllData);
        // 搜索过滤
        if (searchTerm) {
            var term = searchTerm.toLowerCase();
            data = data.filter(function(d) {
                return d.mac.toLowerCase().indexOf(term) >= 0 ||
                       d.hostname.toLowerCase().indexOf(term) >= 0 ||
                       d.ips.some(function(ip) { return ip.indexOf(term) >= 0; });
            });
        }
        // IPv4/v6 过滤
        if (ipFilter == 'ipv4') {
            data = data.filter(function(d) { return d.ips.some(function(ip) { return ip.indexOf('.') >= 0; }); });
        } else if (ipFilter == 'ipv6') {
            data = data.filter(function(d) { return d.ips.some(function(ip) { return ip.indexOf(':') >= 0; }); });
        }
        // 排序
        data.sort(function(a, b) {
            var va = (sortField == 'upload' ? a.upload : sortField == 'download' ? a.download : (a.upload + a.download));
            var vb = (sortField == 'upload' ? b.upload : sortField == 'download' ? b.download : (b.upload + b.download));
            return sortOrder == 'asc' ? va - vb : vb - va;
        });
        return data;
    }

    // ==== 渲染图表 ====
    function renderChart(data) {
        var container = document.getElementById('traffic-chart');
        if (!container) return;

        var xData = [], upData = [], downData = [];
        if (currentPeriod == 'day') {
            var minutes = data.minute || [];
            // 时间范围过滤——以数据最后一条记录的时间为基准，而不是浏览器时钟
            if (currentTimeRange != 'all' && minutes.length > 0) {
                var rangeMin = parseInt(currentTimeRange);
                var lastTimeStr = minutes[minutes.length - 1].time;
                var tp = lastTimeStr.split(':');
                var base = new Date();
                base.setHours(parseInt(tp[0]), parseInt(tp[1]), 0, 0);
                var cutoff = new Date(base.getTime() - rangeMin * 60 * 1000);
                var cutoffStr = String(cutoff.getHours()).padStart(2,'0') + ':' + String(cutoff.getMinutes()).padStart(2,'0');
                minutes = minutes.filter(function(m) { return m.time >= cutoffStr; });
            }
            minutes = aggregateMinuteData(minutes);
            for (var i = 0; i < minutes.length; i++) {
                xData.push(minutes[i].time);
                upData.push((minutes[i].upload || 0));
                downData.push((minutes[i].download || 0));
            }
        } else if (currentPeriod == 'month') {
            var days = data.daily || [];
            for (var i = 0; i < days.length; i++) {
                xData.push((days[i].date || '').substring(8));
                upData.push((days[i].upload || 0));
                downData.push((days[i].download || 0));
            }
        } else {
            var months = data.monthly || [];
            for (var i = 0; i < months.length; i++) {
                xData.push((months[i].month || '').substring(5));
                upData.push((months[i].upload || 0));
                downData.push((months[i].download || 0));
            }
        }

        // 选择单位：日视图固定 MB，月/年视图自动
        var unit, divisor;
        if (currentPeriod == 'day') {
            unit = 'MB'; divisor = 1048576;
        } else {
            var allValues = upData.concat(downData);
            var maxVal = Math.max.apply(null, allValues);
            if (maxVal >= 1099511627776) { unit = 'TB'; divisor = 1099511627776; }
            else if (maxVal >= 1073741824) { unit = 'GB'; divisor = 1073741824; }
            else if (maxVal >= 1048576) { unit = 'MB'; divisor = 1048576; }
            else { unit = 'KB'; divisor = 1024; }
        }

        // 按选定单位转换数据
        for (var i = 0; i < upData.length; i++) {
            upData[i] = Math.round(upData[i] / divisor * 10) / 10;
            downData[i] = Math.round(downData[i] / divisor * 10) / 10;
        }

        var isBar = currentPeriod != 'day';
        var option = {
            tooltip: {
                trigger: 'axis',
                formatter: function(params) {
                    var html = params[0].axisValue + '<br/>';
                    for (var i = 0; i < params.length; i++) {
                        var v = params[i].value || 0;
                        var vStr;
                        if (unit == 'TB') {
                            if (v < 1) { vStr = (v * 1024).toFixed(1) + ' GB'; }
                            else { vStr = v.toFixed(2) + ' TB'; }
                        } else if (unit == 'GB') {
                            if (v < 1) { vStr = (v * 1024).toFixed(1) + ' MB'; }
                            else { vStr = v.toFixed(1) + ' GB'; }
                        } else if (unit == 'MB') {
                            if (v < 1) { vStr = (v * 1024).toFixed(1) + ' KB'; }
                            else if (v >= 1024) { vStr = (v / 1024).toFixed(2) + ' GB'; }
                            else { vStr = v.toFixed(1) + ' MB'; }
                        } else {
                            vStr = v.toFixed(1) + ' KB';
                        }
                        html += params[i].marker + ' ' + params[i].seriesName + ': ' + vStr + '<br/>';
                    }
                    return html;
                }
            },
            legend: { data: ['下载', '上传'], top: 5 },
            grid: { left: 60, right: 20, top: 40, bottom: 30 },
            xAxis: { type: 'category', data: xData, boundaryGap: isBar },
            yAxis: { type: 'value', name: unit },
            series: [
                { name: '下载', type: isBar ? 'bar' : 'line', data: downData, smooth: !isBar, barMaxWidth: isBar ? 40 : undefined, lineStyle: { color: '#5cb85c' }, itemStyle: { color: '#5cb85c' } },
                { name: '上传', type: isBar ? 'bar' : 'line', data: upData, smooth: !isBar, barMaxWidth: isBar ? 40 : undefined, lineStyle: { color: '#337ab7' }, itemStyle: { color: '#337ab7' } }
            ]
        };

        if (!chartInstance) {
            chartInstance = echarts.init(container);
        }
        chartInstance.setOption(option, true);
    }

    // ==== 渲染 IP 表格 ====
    function renderIPTable() {
        var filtered = getFilteredSortedIPs();
        var totalPages = Math.ceil(filtered.length / pageSize) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        var start = (currentPage - 1) * pageSize;
        var pageData = filtered.slice(start, start + pageSize);

        var tbody = document.getElementById('ip-table-body');
        if (!tbody) return;
        var html = '';

        // 提取当前的搜索词，转为小写便于匹配
        var term = searchTerm ? searchTerm.toLowerCase() : '';

        for (var i = 0; i < pageData.length; i++) {
            var d = pageData[i];
            var ips = d.ips || [];

            var mainIP = '';
            var subIPs = [];
            var hasHiddenMatch = false; // 标记被收纳的 IP 是否命中了搜索词

            // 1. 选举主 IP 和收集次要 IP
            // 优先找 IPv4
            for (var j = 0; j < ips.length; j++) {
                if (ips[j].indexOf('.') >= 0) {
                    if (!mainIP) mainIP = ips[j];
                    else subIPs.push(ips[j]);
                }
            }
            // 如果没找到 IPv4，找公网 IPv6
            for (var j = 0; j < ips.length; j++) {
                if (ips[j].indexOf(':') >= 0 && !ips[j].startsWith('fe80')) {
                    if (!mainIP) mainIP = ips[j];
                    else subIPs.push(ips[j]);
                }
            }
            // 剩下的兜底 IP（如 fe80 链路本地等）
            for (var j = 0; j < ips.length; j++) {
                if (ips[j] !== mainIP && subIPs.indexOf(ips[j]) < 0) {
                    subIPs.push(ips[j]);
                }
            }
            // 如果连主 IP 都没选出来，拿第一个兜底
            if (!mainIP && ips.length > 0) {
                mainIP = ips[0];
                subIPs = ips.slice(1);
            }

            // 2. 检查被隐藏的次要 IP 是否包含了搜索关键字
            if (term && subIPs.length > 0) {
                for (var k = 0; k < subIPs.length; k++) {
                    if (subIPs[k].toLowerCase().indexOf(term) >= 0) {
                        hasHiddenMatch = true;
                        break;
                    }
                }
            }

            // 3. 构建第一列的 HTML
            var ipColumnHtml = '';
            if (subIPs.length === 0) {
                // 只有一个 IP，正常显示
                ipColumnHtml = '<strong>' + (mainIP || '--') + '</strong>';
            } else {
                // 有多个 IP，使用 details 标签折叠。如果命中了隐藏 IP 搜索，则默认带上 open 属性
                var openAttr = hasHiddenMatch ? ' open' : '';
                ipColumnHtml = '<details class="ipv6-collapse"' + openAttr + '>' +
                    '<summary>' +
                    '<strong>' + mainIP + '</strong>' +
                    '<span class="ip-count-badge">(+' + subIPs.length + ' 个 IP)</span>' +
                    '</summary>' +
                    '<div class="ip-list-box">';
                for (var m = 0; m < subIPs.length; m++) {
                    // 如果该次要 IP 是触发搜索的项，可以加个高亮样式（这里用粗体示范，也可以用 background）
                    var isMatched = term && subIPs[m].toLowerCase().indexOf(term) >= 0;
                    var style = isMatched ? 'style="color:#d9534f; font-weight:bold;"' : '';
                    ipColumnHtml += '<div ' + style + '>' + subIPs[m] + '</div>';
                }
                ipColumnHtml += '</div></details>';
            }

            // 4. 组装整行
            html += '<tr>' +
                '<td class="ip-col">' + ipColumnHtml + '</td>' +
                '<td>' + (d.mac.startsWith('unknown_') ? '--' : d.mac) + '</td>' +
                '<td>' + (d.hostname || '--') + '</td>' +
                '<td style="color:#5cb85c;">' + formatBytes(d.download) + '</td>' +
                '<td style="color:#337ab7;">' + formatBytes(d.upload) + '</td>' +
                '<td><strong>' + formatBytes(d.upload + d.download) + '</strong></td>' +
                '</tr>';
        }
        tbody.innerHTML = html;

        // 更新汇总
        renderSummary(filtered);

        // 渲染分页
        renderPagination(totalPages);
    }

    // ==== 渲染汇总 ====
    function renderSummary(data) {
        var totalUp = 0, totalDown = 0;
        for (var i = 0; i < data.length; i++) {
            totalUp += data[i].upload;
            totalDown += data[i].download;
        }
        var el = document.getElementById('traffic-summary');
        if (el) {
            el.innerHTML = '<div class="stat-item">下载: <strong style="color:#5cb85c;">' + formatBytes(totalDown) + '</strong></div>' +
                           '<div class="stat-item">上传: <strong style="color:#337ab7;">' + formatBytes(totalUp) + '</strong></div>' +
                           '<div class="stat-item">总计: <strong>' + formatBytes(totalUp + totalDown) + '</strong></div>';
        }
    }

    // ==== 渲染分页 ====
    function renderPagination(totalPages) {
        var el = document.getElementById('ip-pagination');
        if (!el || totalPages <= 1) { if (el) el.innerHTML = ''; return; }
        var html = '<span style="margin-right:8px;">页: ' + currentPage + '/' + totalPages + '</span>';
        html += '<button onclick="goToPage(1)" ' + (currentPage <= 1 ? 'disabled' : '') + '>«</button>';
        html += '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>‹</button>';
        var maxShow = 5;
        var s = Math.max(1, currentPage - 2);
        var e = Math.min(totalPages, s + maxShow - 1);
        s = Math.max(1, e - maxShow + 1);
        for (var i = s; i <= e; i++) {
            html += '<button onclick="goToPage(' + i + ')" ' + (i == currentPage ? 'class="active" style="background:#337ab7;color:#fff;"' : '') + '>' + i + '</button>';
        }
        html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>›</button>';
        html += '<button onclick="goToPage(' + totalPages + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>»</button>';
        el.innerHTML = html;
    }

    function goToPage(p) {
        currentPage = p;
        renderIPTable();
    }

    // ==== 设置排序 ====
    function setSort(field) {
        if (sortField == field) {
            sortOrder = sortOrder == 'asc' ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortOrder = 'desc';
        }
        renderIPTable();
        updateSortArrows();
    }

    function updateSortArrows() {
        var allArrows = document.querySelectorAll('.sort-arrow');
        for (var i = 0; i < allArrows.length; i++) {
            allArrows[i].classList.remove('active');
        }
        var arrows = document.querySelectorAll('.sort-arrow .arrow');
        for (var j = 0; j < arrows.length; j++) {
            arrows[j].innerHTML = '↕';
        }
        var active = document.querySelector('.sort-arrow[data-field="' + sortField + '"]');
        if (active) {
            active.classList.add('active');
            var activeArrow = active.querySelector('.arrow');
            if (activeArrow) {
                activeArrow.innerHTML = sortOrder == 'asc' ? '↑' : '↓';
            }
        }
    }

    // ==== 加载数据 ====
    function loadTrafficData() {
        var date = currentDate || getDefaultDate();
        var url = '<%=dsp.build_url("admin/network/traffic_stats")%>';
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url + '?period=' + currentPeriod + '&date=' + date, true);
        xhr.onload = function() {
            if (xhr.status == 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    window._lastTrafficData = data;
                    ipAllData = data.ip || [];
                    renderChart(data);
                    renderIPTable();
                } catch(e) {
                    console.error('[Traffic] Parse error:', e);
                }
            }
        };
        xhr.send();
    }

    // ==== 切换视图（下拉框驱动）====
    function onPeriodChange() {
        currentPeriod = document.getElementById('period-select').value;
        currentDate = getDefaultDate();
        currentPage = 1;
        updateDateInput();
        loadTrafficData();
    }

    function updateDateInput() {
        var dateInput = document.getElementById('date-input');
        var dateSelect = document.getElementById('date-select');
        var timeRangeBar = document.getElementById('time-range-bar');
        timeRangeBar.style.display = (currentPeriod == 'day') ? 'flex' : 'none';
        if (currentPeriod != 'day') currentTimeRange = 'all';

        if (currentPeriod == 'year') {
            // 年视图：用 select 下拉框
            dateInput.style.display = 'none';
            dateSelect.style.display = '';
            var thisYear = parseInt(getThisYear());
            var html = '';
            for (var y = thisYear; y >= 2020; y--) {
                var sel = (String(y) == currentDate) ? ' selected' : '';
                html += '<option value="' + y + '"' + sel + '>' + y + ' 年</option>';
            }
            dateSelect.innerHTML = html;
        } else {
            // 日/月视图：用 input，只切换 date/month
            dateSelect.style.display = 'none';
            dateInput.style.display = '';
            var saved = dateInput.onchange;
            dateInput.onchange = null;
            dateInput.type = (currentPeriod == 'day') ? 'date' : 'month';
            dateInput.max = (currentPeriod == 'day') ? getToday() : getThisMonth();
            dateInput.value = currentDate;
            setTimeout(function() { dateInput.onchange = saved; }, 100);
        }
    }

    function switchTimeRange(range) {
        currentTimeRange = range;
        var btns = document.querySelectorAll('#time-range-bar button');
        for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
        var targetBtn = document.getElementById('tr-' + range);
        if (targetBtn) targetBtn.classList.add('active');
        if (window._lastTrafficData && window._lastTrafficData.minute) {
            renderChart(window._lastTrafficData);
        } else {
            loadTrafficData();
        }
    }

    // ==== 日期变更 ====
    function onDateChange() {
        var dateInput = document.getElementById('date-input');
        var dateSelect = document.getElementById('date-select');
        // 日/月视图从 input 取值，年视图从 select 取值
        currentDate = (dateSelect.style.display == 'none') ? dateInput.value : dateSelect.value;
        currentPage = 1;
        loadTrafficData();
    }

    function onSearchChange() {
        searchTerm = document.getElementById('traffic-search').value;
        currentPage = 1;
        renderIPTable();
    }

    function onFilterChange() {
        ipFilter = document.getElementById('traffic-filter').value;
        currentPage = 1;
        renderIPTable();
    }

    // ==== 加载配置 ====
    function loadConfig() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '<%=dsp.build_url("admin/network/traffic_config_get")%>', true);
        xhr.onload = function() {
            if (xhr.status == 200) {
                try {
                    var cfg = JSON.parse(xhr.responseText);
                    document.getElementById('cfg-enabled').checked = (cfg.enabled == '1');
                    document.getElementById('cfg-interval').value = cfg.collect_interval || '60';
                    document.getElementById('cfg-persist').value = cfg.persist_interval || '30';
                    document.getElementById('cfg-retain-min').value = cfg.retain_minutes || '1';
                    document.getElementById('cfg-retain-day').value = cfg.retain_days || '90';
                    document.getElementById('cfg-retain-mon').value = cfg.retain_months || '12';
                    document.getElementById('cfg-retain-yr').value = cfg.retain_years || '5';
                } catch(e) {}
            }
        };
        xhr.send();
    }

    function saveConfig() {
        var btn = document.getElementById('cfg-save-btn');
        var params = 'enabled=' + (document.getElementById('cfg-enabled').checked ? '1' : '0') +
            '&collect_interval=' + document.getElementById('cfg-interval').value +
            '&persist_interval=' + document.getElementById('cfg-persist').value +
            '&retain_minutes=' + document.getElementById('cfg-retain-min').value +
            '&retain_days=' + document.getElementById('cfg-retain-day').value +
            '&retain_months=' + document.getElementById('cfg-retain-mon').value +
            '&retain_years=' + document.getElementById('cfg-retain-yr').value;
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '<%=dsp.build_url("admin/network/traffic_config_set")%>', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.onload = function() {
            if (xhr.status == 200) {
                var orig = btn.textContent;
                btn.textContent = '已保存';
                btn.style.background = '#5cb85c';
                btn.style.color = '#fff';
                setTimeout(function() {
                    btn.textContent = orig;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            }
        };
        xhr.send(params);
    }

    // ==== 页面初始化 ====
    window.addEventListener('load', function() {
        currentDate = getDefaultDate();
        document.getElementById('date-input').max = getToday();
        updateDateInput();
        loadTrafficData();
        loadConfig();

        // 自动刷新
        pollTimer = setInterval(function() {
            if (!document.getElementById('traffic-chart')) {
                clearInterval(pollTimer);
                return;
            }
            loadTrafficData();
        }, pollInterval);

        // 窗口大小变化时重绘图表
        window.addEventListener('resize', function() {
            if (chartInstance) chartInstance.resize();
        });
    });

    // 页面离开清理
    window.addEventListener('beforeunload', function() {
        if (pollTimer) clearInterval(pollTimer);
        if (chartInstance) chartInstance.dispose();
    });
//]]></script>

<div id="traffic-container">
    <fieldset id="traffic-config" style="margin-bottom:15px;padding:10px 15px;border:1px solid #ddd;border-radius:4px;background:#fafafa;">
        <legend style="font-weight:bold;font-size:14px;">流量采集设置</legend>
        <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;">
                <input type="checkbox" id="cfg-enabled"> 启用采集
            </label>
            <label style="white-space:nowrap;">采集间隔 <input type="number" id="cfg-interval" min="30" max="300" style="width:70px;"> 秒</label>
            <label style="white-space:nowrap;">备份间隔 <input type="number" id="cfg-persist" min="0" max="1440" style="width:70px;"> 分钟</label>
            <span style="color:#ccc;margin:0 4px;">|</span>
            <label style="white-space:nowrap;">分钟数据保留 <input type="number" id="cfg-retain-min" min="1" max="30" style="width:60px;"> 天</label>
            <label style="white-space:nowrap;">日数据保留 <input type="number" id="cfg-retain-day" min="7" max="730" style="width:60px;"> 天</label>
            <label style="white-space:nowrap;">月数据保留 <input type="number" id="cfg-retain-mon" min="1" max="120" style="width:60px;"> 月</label>
            <label style="white-space:nowrap;">年数据保留 <input type="number" id="cfg-retain-yr" min="1" max="100" style="width:60px;"> 年</label>
            <button type="button" id="cfg-save-btn" onclick="saveConfig()" style="margin-left:auto;padding:5px 14px;border:1px solid #ccc;border-radius:3px;cursor:pointer;background:#fff;">保存设置</button>
        </div>
    </fieldset>

    <div id="traffic-toolbar">
        <select id="period-select" onchange="onPeriodChange()" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;">
            <option value="day">日视图</option>
            <option value="month">月视图</option>
            <option value="year">年视图</option>
        </select>
        <input type="date" id="date-input" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;" onchange="onDateChange()" onclick="if(this.showPicker)this.showPicker()">
        <select id="date-select" style="display:none;padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;" onchange="onDateChange()"></select>
        <span style="margin-left:auto;font-size:12px;color:#888;">自动刷新: 60s</span>
    </div>

    <div id="time-range-bar" style="display:flex;">
        <span style="font-size:12px;color:#888;margin-right:4px;">时间范围:</span>
        <button type="button" id="tr-30" onclick="switchTimeRange('30')">30分钟</button>
        <button type="button" id="tr-60" onclick="switchTimeRange('60')">1小时</button>
        <button type="button" id="tr-180" onclick="switchTimeRange('180')">3小时</button>
        <button type="button" id="tr-360" onclick="switchTimeRange('360')">6小时</button>
        <button type="button" id="tr-720" onclick="switchTimeRange('720')">12小时</button>
        <button type="button" id="tr-all" class="active" onclick="switchTimeRange('all')">全天</button>
    </div>

    <div id="traffic-chart"></div>

    <div id="traffic-summary"></div>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <input type="text" id="traffic-search" placeholder="搜索 IP/MAC/主机名" oninput="onSearchChange()">
        <select id="traffic-filter" onchange="onFilterChange()">
            <option value="all">全部</option>
            <option value="ipv4">IPv4</option>
            <option value="ipv6">IPv6</option>
        </select>
    </div>

    <table class="table cbi-section-table traffic-table">
        <tr class="tr table-titles">
            <th class="th">IP 地址</th>
            <th class="th">MAC</th>
            <th class="th">主机名</th>
            <th class="th sort-arrow" data-field="download" onclick="setSort('download')">下载 <span class="arrow">↕</span></th>
            <th class="th sort-arrow" data-field="upload" onclick="setSort('upload')">上传 <span class="arrow">↕</span></th>
            <th class="th sort-arrow active" data-field="total" onclick="setSort('total')">总计 <span class="arrow">↓</span></th>
        </tr>
        <tbody id="ip-table-body">
            <tr><td colspan="6" style="text-align:center;"><em>加载中...</em></td></tr>
        </tbody>
    </table>

    <div id="ip-pagination" style="display:flex;justify-content:center;margin-top:10px;gap:4px;"></div>
</div>
